<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Akka!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 10;
        }
        h1 {
            color: #d81b60;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s ease-in-out;
        }
        p {
            font-size: 1.2rem;
            color: #444;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #ff4081;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); }
        .show h1 {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

<div class="container" id="card">
    <button class="btn" id="wishBtn">Click to See the Surprise! 🎁</button>
    <div id="message" style="display:none;">
        <h1>Happy Birthday Loku Akka! 🎂</h1>
        <p>ඔයාට නිදුක් නිරෝගී, සතුට පිරුණු සුබම සුබ උපන්දිනයක් වේවා!</p>
    </div>
</div>

<script>
    document.getElementById('wishBtn').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('message').style.display = 'block';
        setTimeout(() => { document.getElementById('card').classList.add('show'); }, 100);
        
        // Confetti effect
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) { return clearInterval(interval); }
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    });
</script>

</body>
</html>
