<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Loku Akka!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff477e; --secondary: #ff85a1; --bg: #fce4ec; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%); font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center; }
        .bg-elements { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 1; pointer-events: none; }
        .balloon { position: absolute; bottom: -100px; width: 40px; height: 50px; background: var(--secondary); border-radius: 50%; opacity: 0.5; animation: floatUp 10s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; } }
        .container { position: relative; z-index: 10; padding: 20px; width: 90%; max-width: 600px; }
        .cake-container { margin-bottom: 30px; transform: scale(1.3); }
        .cake-svg { width: 150px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.8rem; color: #d81b60; margin: 10px 0; opacity: 0; animation: fadeInUp 1s forwards 0.5s; }
        .wish-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(216, 27, 96, 0.15); border: 2px solid white; display: none; }
        #typing-text { font-size: 1.15rem; color: #444; line-height: 1.8; min-height: 100px; }
        .signature { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff477e; margin-top: 25px; display: block; opacity: 0; }
        .btn-main { background: linear-gradient(45deg, #ff477e, #ff85a1); color: white; padding: 22px 45px; border: none; border-radius: 50px; font-size: 1.4rem; font-weight: 600; cursor: pointer; box-shadow: 0 8px 25px rgba(255, 71, 126, 0.4); transition: 0.3s; }
        .btn-main:hover { transform: scale(1.08); box-shadow: 0 12px 30px rgba(255, 71, 126, 0.5); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .flame { animation: flicker 0.6s infinite alternate; transform-origin: center bottom; }
        @keyframes flicker { 0% { transform: scale(1) rotate(-2deg); } 100% { transform: scale(1.1) rotate(2deg); opacity: 0.9; } }
    </style>
</head>
<body>

<div class="bg-elements" id="balloons"></div>

<div class="container">
    <div id="start-screen">
        <button class="btn-main" id="openBtn">🎁 Surprise for Loku Akka 🎁</button>
    </div>

    <div id="main-content" style="display:none;">
        <div class="cake-container">
            <svg class="cake-svg" viewBox="0 0 100 100">
                <rect x="20" y="70" width="60" height="25" rx="5" fill="#f06292"/>
                <rect x="25" y="50" width="50" height="20" rx="5" fill="#f48fb1"/>
                <rect x="32" y="35" width="36" height="15" rx="5" fill="#f8bbd0"/>
                <path d="M20 70 q5 5 10 0 t10 0 t10 0 t10 0 t10 0 t10 0" fill="none" stroke="#ad1457" stroke-width="2"/>
                <rect x="47" y="20" width="6" height="15" fill="#fff176"/>
                <path class="flame" d="M50 5 Q55 15 50 20 Q45 15 50 5" fill="#ffeb3b"/>
            </svg>
        </div>
        <h1>Happy Birthday Loku Akka!</h1>
        <div class="wish-card" id="card">
            <div id="typing-text"></div>
            <span class="signature" id="sig">- Your Thambi -</span>
        </div>
    </div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg
