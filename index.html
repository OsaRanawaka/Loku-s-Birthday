<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Loku Akka | Premium Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --bg: #0a0414;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .ambient-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e0b36 0%, #0a0414 100%);
            z-index: 1;
        }

        .gold-particles {
            position: absolute; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
        }

        .luxury-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50px;
            padding: 60px 35px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 100%;
        }

        /* Pulsating Title - UNCHANGED */
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 25px;
            background: linear-gradient(to bottom, #fff 40%, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textPulse 3s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)); transform: scale(1.02); }
        }

        .cake-box { margin-bottom: 30px; }
        .cake-svg { width: 130px; filter: drop-shadow(0 0 15px var(--gold)); }

        .wish-text {
            font-size: 1.05rem;
            color: #d1d1d1;
            line-height: 1.8;
            margin-bottom: 35px;
            font-weight: 300;
            text-align: center;
        }

        .wish-text p { margin-bottom: 15px; min-height: 1.2em; }

        /* Shimmering Signature - UNCHANGED */
        .signature {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: var(--gold);
            font-style: italic;
            opacity: 0;
            display: inline-block;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            0% { text-shadow: 0 0 5px rgba(212, 175, 55, 0.3); }
            50% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 0 30px rgba(212, 175, 55, 0.4); }
            100% { text-shadow: 0 0 5px rgba(212, 175, 55, 0.3); }
        }

        /* Overlay Button - STRICTLY UNCHANGED */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-initiate {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 22px 45px;
            border-radius: 100px;
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.5s;
        }

        .btn-initiate:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

<div id="overlay">
    <button class="btn-initiate" id="startBtn">Initiate Surprise</button>
</div>

<div class="ambient-bg"></div>
<div class="gold-particles" id="particles"></div>

<div class="container" id="content">
    <div class="luxury-card">
        <div class="cake-box" id="cakeContainer">
            <svg class="cake-svg" viewBox="0 0 100 100">
                <rect x="20" y="75" width="60" height="15" fill="#2d134d" rx="4"/>
                <rect x="25" y="58" width="50" height="17" fill="#4a148c" rx="4"/>
                <rect x="32" y="44" width="36" height="14" fill="#6a1b9a" rx="4"/>
                <path d="M20 75 q5 8 10 0 t10 0 t10 0 t10 0 t10 0 t10 0" fill="#6a1b9a"/>
                <rect x="48" y="28" width="4" height="16" fill="#fff" rx="1"/>
                <path d="M50 12 Q55 22 50 28 Q45 22 50 12" fill="#ffd700">
                    <animate attributeName="opacity" values="1;0.6;1" dur="0.4s" repeatCount="indefinite"/>
                </path>
            </svg>
        </div>

        <h1 id="mainTitle">Happy Birthday<br>Loku Akka!</h1>
        
        <div class="wish-text" id="mainWish">
            <p id="line1" data-text="To my amazing Loku Akka,"></p>
            <p id="line2" data-text="Wishing you a truly wonderful birthday filled with immense happiness and vibrant health. 🌟"></p>
            <p id="line3" data-text="May all your future plans 🚀 be crowned with spectacular success, and every goal 🎓 you pursue be met with brilliant fruition."></p>
        </div>
        
        <div class="signature" id="sig">- Your Thambi -</div>
    </div>
</div>

<audio id="bgMusic" loop><source src="song.mp3" type="audio/mpeg"></audio>
<audio id="popSound"><source src="pop.mp3" type="audio/mpeg"></audio>

<script>
    // 1. Particles Background
    const pContainer = document.getElementById('particles');
    for(let i=0; i<40; i++) {
        let p = document.createElement('div');
        p.style.position = 'absolute';
        p.style.width = Math.random() * 3 + 'px';
        p.style.height = p.style.width;
        p.style.background = 'rgba(212, 175, 55, 0.4)';
        p.style.borderRadius = '50%';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        pContainer.appendChild(p);
        gsap.to(p, { y: "random(-100, 100)", x: "random(-100, 100)", opacity: "random(0.1, 0.7)", duration: "random(3, 6)", repeat: -1, yoyo: true, ease: "sine.inOut" });
    }

    // Typing Logic
    async function typeEffect(elementId) {
        const el = document.getElementById(elementId);
        const text = el.getAttribute('data-text');
        for (let i = 0; i <= text.length; i++) {
            el.textContent = text.substring(0, i);
            await new Promise(res => setTimeout(res, 35)); // Typing speed
        }
    }

    // 2. Surprise Trigger
    document.getElementById('startBtn').addEventListener('click', function() {
        document.getElementById('bgMusic').play();
        document.getElementById('popSound').play();

        gsap.to("#overlay", { opacity: 0, duration: 1.5, onComplete: () => {
            document.getElementById('overlay').style.display = 'none';
        }});

        const content = document.getElementById('content');
        content.style.visibility = 'visible';

        const tl = gsap.timeline();
        tl.from(".luxury-card", { scale: 0.85, opacity: 0, y: 50, duration: 1.5, ease: "expo.out" })
          .from("#cakeContainer", { scale: 0, rotation: -45, duration: 1, ease: "back.out(1.7)" }, "-=0.8")
          .from("#mainTitle", { y: 40, opacity: 0, duration: 1.2, ease: "power4.out" }, "-=0.5")
          .add(async () => {
              // Typing sequence starts exactly after the Title appears
              await typeEffect('line1');
              await typeEffect('line2');
              await typeEffect('line3');
              // Show signature only after typing finishes
              gsap.to("#sig", { opacity: 1, duration: 1.5, ease: "power2.out" });
          });

        var end = Date.now() + (6 * 1000);
        (function frame() {
            confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#d4af37', '#ffffff'] });
            confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#d4af37', '#ffffff'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        gsap.to("#cakeContainer", { y: -15, duration: 2, repeat: -1, yoyo: true, ease: "sine.inOut" });
    });
</script>

</body>
</html>
