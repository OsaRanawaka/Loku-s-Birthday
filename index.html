<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Loku Akka! 🌟</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Montserrat', sans-serif;
        }

        /* Animated Nebula Background */
        .nebula {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0033 0%, #050505 100%);
            z-index: 1;
        }

        .stars { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        .container {
            position: relative; z-index: 10;
            text-align: center; width: 90%; max-width: 450px;
        }

        /* Pro Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 25px;
            box-shadow: 0 0 40px rgba(0, 217, 232, 0.1);
            display: none;
            animation: cardIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardIn { from { opacity: 0; transform: translateY(50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* 3D Animated Cake */
        .cake-3d {
            margin: 0 auto 25px;
            position: relative; width: 120px;
            animation: cakeFloat 4s ease-in-out infinite;
        }

        @keyframes cakeFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .cake-svg { filter: drop-shadow(0 0 15px #05d9e8); }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem; margin-bottom: 15px;
            color: #fff;
            text-shadow: 0 0 10px #ff2a6d, 0 0 20px #ff2a6d, 0 0 40px #ff2a6d;
            animation: neonPulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes neonPulse { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 20px #ff2a6d, 0 0 50px #ff2a6d; } }

        #msg { font-size: 1rem; color: #ccc; line-height: 1.7; min-height: 100px; }

        .sig { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #05d9e8; opacity: 0; margin-top: 15px; transition: 2s; }

        .btn-start {
            background: linear-gradient(45deg, #ff2a6d, #05d9e8);
            border: none; padding: 22px 55px; border-radius: 100px;
            color: #fff; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255, 42, 109, 0.5);
            transition: 0.4s;
        }
        .btn-start:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(5, 217, 232, 0.6); }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle 2s infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="nebula"></div>
<div class="stars" id="starField"></div>

<div class="container">
    <div id="start">
        <button class="btn-start" id="go">🎁 SEE THE MAGIC 🎁</button>
    </div>

    <div id="main" class="card">
        <div class="cake-3d">
            <svg class="cake-svg" viewBox="0 0 100 100">
                <rect x="20" y="65" width="60" height="20" rx="5" fill="#ff2a6d"/>
                <rect x="28" y="50" width="44" height="15" rx="5" fill="#ff71ce"/>
                <rect x="35" y="38" width="30" height="12" rx="5" fill="#05d9e8"/>
                <circle cx="50" cy="22" r="2" fill="#fff"/>
                <path d="M50 5 Q54 14 50 20 Q46 14 50 5" fill="#ffd700">
                    <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
                </path>
            </svg>
        </div>
        <h1>Happy Birthday Akka!</h1>
        <div id="msg"></div>
        <div class="sig" id="sig">- Your Thambi -</div>
    </div>
</div>

<audio id="music" loop><source src="song.mp3" type="audio/mpeg"></audio>
<audio id="pop"><source src="pop.mp3" type="audio/mpeg"></audio>

<script>
    // Create random stars
    const sf = document.getElementById('starField');
    for(let i=0; i<80; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        let size = Math.random() * 3 + 'px';
        s.style.width = size; s.style.height = size;
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.animationDelay = Math.random() * 5 + 's';
        sf.appendChild(s);
    }

    const wish = "To my amazing Loku Akka,\n\nWishing you a truly wonderful birthday filled with immense happiness and vibrant health. 🌟\n\nMay all your future plans 🚀 be crowned with spectacular success, and every goal 🎓 you pursue be met with brilliant fruition.\n\nKeep soaring and making us proud!";

    document.getElementById('go').addEventListener('click', function() {
        document.getElementById('music').play().catch(e => console.log(e));
        document.getElementById('pop').play().catch(e => console.log(e));
        
        document.getElementById('start').style.display = 'none';
        document.getElementById('main').style.display = 'block';

        // Pro Confetti
        var end = Date.now() + (10 * 1000);
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff2a6d', '#05d9e8'] });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff2a6d', '#05d9e8'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        // Typewriter
        let i = 0;
        const el = document.getElementById('msg');
        function type() {
            if (i < wish.length) {
                el.innerHTML += wish.charAt(i) === '\n' ? '<br>' : wish.charAt(i);
                i++;
                setTimeout(type, 45);
            } else {
                document.getElementById('sig').style.opacity = '1';
                document.getElementById('sig').style.transform = 'translateY(-5px)';
            }
        }
        setTimeout(type, 1200);
    });
</script>
</body>
</html>
