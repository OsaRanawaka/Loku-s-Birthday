<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Dearest Akka 💖</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff2a6d; --s: #05d9e8; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0221;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden; 
            color: var(--w);
            position: relative;
        }

        /* Particles Background */
        #particles {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #240b36 0%, #0d0221 100%);
            z-index: 1;
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Pro Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            display: none;
            animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .cake-box { margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--p)); }
        .cake-svg { width: 100px; }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, var(--p), var(--s), var(--p));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove { to { background-position: 200% center; } }

        #wish-text { font-size: 0.95rem; line-height: 1.6; color: #ddd; margin-bottom: 20px; min-height: 100px; }

        .signature { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--s); opacity: 0; transition: 1s; margin-top: 15px; }

        .btn-pro {
            background: linear-gradient(45deg, var(--p), #ff71ce);
            border: none; padding: 20px 40px; border-radius: 50px;
            color: white; font-size: 1rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 42, 109, 0.4);
            transition: 0.4s;
            z-index: 20;
        }
        .btn-pro:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 42, 109, 0.6); }

        .floating-item { position: absolute; pointer-events: none; animation: floatAnim 15s linear infinite; z-index: 2; }
        @keyframes floatAnim {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="particles"></div>

<div class="main-wrapper">
    <div id="start-screen">
        <button class="btn-pro" id="trigger">🎁 Open Surprise 🎁</button>
    </div>

    <div id="card" class="glass-card">
        <div class="cake-box">
            <svg class="cake-svg" viewBox="0 0 100 100">
                <rect x="25" y="60" width="50" height="20" rx="3" fill="#ff2a6d"/>
                <rect x="30" y="45" width="40" height="15" rx="3" fill="#ff71ce"/>
                <rect x="35" y="32" width="30" height="13" rx="3" fill="#05d9e8"/>
                <rect x="48" y="18" width="4" height="14" fill="#fff"/>
                <path d="M50 5 Q54 12 50 18 Q46 12 50 5" fill="#ffd700">
                    <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite" />
                </path>
            </svg>
        </div>
        <h1>Happy Birthday Akka!</h1>
        <div id="wish-text"></div>
        <div id="sig" class="signature">- Your Thambi -</div>
    </div>
</div>

<audio id="bgMusic" loop preload="auto"><source src="song.mp3" type="audio/mpeg"></audio>
<audio id="popSound" preload="auto"><source src="pop.mp3" type="audio/mpeg"></audio>

<script>
    // Create Background Particles
    const partContainer = document.getElementById('particles');
    const items = ['❤️', '✨', '🎈', '⭐'];
    for(let i=0; i<25; i++) {
        let span = document.createElement('span');
        span.className = 'floating-item';
        span.innerHTML = items[Math.floor(Math.random()*items.length)];
        span.style.left = Math.random() * 100 + 'vw';
        span.style.fontSize = (Math.random() * 20 + 10) + 'px';
        span.style.animationDuration = (Math.random() * 8 + 7) + 's';
        span.style.animationDelay = (Math.random() * 10) + 's';
        partContainer.appendChild(span);
    }

    const wish = "To my amazing Loku Akka,\n\nWishing you a truly wonderful birthday filled with immense happiness and vibrant health. 🌟\n\nMay all your future plans 🚀 be crowned with spectacular success, and every goal 🎓 you pursue be met with brilliant fruition.\n\nKeep soaring and making us proud!";

    document.getElementById('trigger').addEventListener('click', function() {
        const music = document.getElementById('bgMusic');
        const pop = document.getElementById('popSound');
        
        // Forced Audio Play
        music.play().catch(e => console.error("Music Error:", e));
        pop.play().catch(e => console.error("Pop Error:", e));

        document.getElementById('start-screen').style.display = 'none';
        const card = document.getElementById('card');
        card.style.display = 'block';

        // Confetti
        var end = Date.now() + (8 * 1000);
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff2a6d', '#05d9e8'] });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff2a6d', '#05d9e8'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        // Typewriter Effect
        let i = 0;
        const textEl = document.getElementById('wish-text');
        function type() {
            if (i < wish.length) {
                textEl.innerHTML += wish.charAt(i) === '\n' ? '<br>' : wish.charAt(i);
                i++;
                setTimeout(type, 50);
            } else {
                document.getElementById('sig').style.opacity = '1';
            }
        }
        setTimeout(type, 800);
    });
</script>
</body>
</html>
