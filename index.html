<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Magic for Loku Akka 💖</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff0055; --s: #00e5ff; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            height: 100vh; width: 100vw;
            display: grid; place-items: center; /* Perfect Centering */
            overflow: hidden; font-family: 'Poppins', sans-serif;
            perspective: 1000px;
        }

        /* Animated Background Waves */
        .bg-gradient {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0a0a0a, #1a0033, #0d0221, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 1;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 480px; }

        /* Modern Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            display: none;
            animation: cardReveal 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes cardReveal { from { opacity: 0; transform: rotateY(-30deg) translateZ(-100px); } to { opacity: 1; transform: rotateY(0) translateZ(0); } }

        /* Premium Floating Cake */
        .cake-wrapper { margin-bottom: 30px; animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .cake-svg { width: 130px; filter: drop-shadow(0 0 20px var(--p)); }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem; margin-bottom: 20px;
            background: linear-gradient(to right, var(--p), #ff71ce, var(--s));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(255, 0, 85, 0.3);
        }

        #wish-box { font-size: 1rem; color: #e0e0e0; line-height: 1.8; margin-bottom: 25px; min-height: 100px; }
        .signature { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--s); opacity: 0; transition: 2s; }

        .btn-launch {
            background: linear-gradient(45deg, var(--p), #7b1fa2);
            border: none; padding: 25px 60px; border-radius: 100px;
            color: #fff; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.5);
            transition: 0.5s;
        }
        .btn-launch:hover { transform: scale(1.1) translateY(-5px); box-shadow: 0 0 60px var(--p); }

        .item { position: absolute; pointer-events: none; opacity: 0.3; animation: up 10s linear infinite; }
        @keyframes up { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { transform: translateY(-20vh); opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-gradient"></div>
<div id="floaters"></div>

<div class="container">
    <div id="start-view">
        <button class="btn-launch" id="btn-play">🎁 Open Surprise 🎁</button>
    </div>

    <div id="main-view" class="glass-card">
        <div class="cake-wrapper">
            <svg class="cake-svg" viewBox="0 0 100 100">
                <rect x="20" y="70" width="60" height="20" rx="5" fill="#d81b60"/>
                <rect x="25" y="52" width="50" height="18" rx="5" fill="#f06292"/>
                <rect x="32" y="38" width="36" height="14" rx="5" fill="#4dd0e1"/>
                <path d="M20 70 q5 10 10 0 t10 0 t10 0 t10 0 t10 0 t10 0" fill="#f06292"/>
                <rect x="48" y="20" width="4" height="18" fill="#fff" rx="2"/>
                <path d="M50 2 Q56 12 50 20 Q44 12 50 2" fill="#ffd700">
                    <animate attributeName="opacity" values="1;0.5;1" dur="0.6s" repeatCount="indefinite"/>
                </path>
            </svg>
        </div>
        <h1>Happy Birthday Akka!</h1>
        <div id="wish-box"></div>
        <div id="sig-text" class="signature">- Your Thambi -</div>
    </div>
</div>

<audio id="audioSong" loop><source src="song.mp3" type="audio/mpeg"></audio>
<audio id="audioPop"><source src="pop.mp3" type="audio/mpeg"></audio>

<script>
    // Create random floating items
    const fl = document.getElementById('floaters');
    const icons = ['💖', '🎈', '⭐', '✨'];
    for(let i=0; i<30; i++) {
        let s = document.createElement('span');
        s.className = 'item';
        s.innerHTML = icons[Math.floor(Math.random()*icons.length)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.animationDelay = Math.random() * 10 + 's';
        s.style.fontSize = Math.random() * 20 + 10 + 'px';
        fl.appendChild(s);
    }

    const wishText = "To my amazing Loku Akka,\n\nWishing you a truly wonderful birthday filled with immense happiness and vibrant health. 🌟\n\nMay all your future plans 🚀 be crowned with spectacular success, and every goal 🎓 you pursue be met with brilliant fruition.\n\nKeep soaring and making us proud!";

    document.getElementById('btn-play').addEventListener('click', function() {
        document.getElementById('audioSong').play();
        document.getElementById('audioPop').play();
        
        document.getElementById('start-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';

        // Master Confetti Burst
        var end = Date.now() + (8 * 1000);
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0055', '#00e5ff', '#ffd700'] });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0055', '#00e5ff', '#ffd700'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        // Typewriter Effect
        let i = 0;
        const target = document.getElementById('wish-box');
        function type() {
            if (i < wishText.length) {
                target.innerHTML += wishText.charAt(i) === '\n' ? '<br>' : wishText.charAt(i);
                i++;
                setTimeout(type, 45);
            } else {
                document.getElementById('sig-text').style.opacity = '1';
                document.getElementById('sig-text').style.transform = 'translateY(-10px)';
            }
        }
        setTimeout(type, 1500);
    });
</script>
</body>
</html>
